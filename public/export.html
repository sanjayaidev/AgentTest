<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Export Designs — Canva Connect</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  :root { --bg:#0f1115; --panel:#171a21; --line:#2a2e38; --text:#e8eaed; --muted:#9aa0ab; --accent:#7c5cff; --success:#3ecf6f; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
  h1 { font-size: 22px; margin: 0 0 4px; }
  h1 span { color: var(--accent); }
  .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .dot { width:8px; height:8px; border-radius:50%; background:#666; display:inline-block; margin-right:8px; }
  .status.connected .dot { background:#3ecf6f; }
  .status.off .dot { background:#e5484d; }
  button, a.btn { background: var(--accent); color:#fff; border:none; padding:10px 16px; border-radius:8px; font-size:14px; cursor:pointer; text-decoration:none; display:inline-block; }
  button:disabled { opacity:.5; cursor:default; }
  button.secondary, a.btn.secondary { background: transparent; border: 1px solid var(--line); color: var(--text); }
  button.success { background: var(--success); }
  input, select { width:100%; padding:10px; border-radius:8px; border:1px solid var(--line); background:#0f1115; color:var(--text); margin-bottom:10px; font-size:14px; }
  label { font-size:12px; color:var(--muted); display:block; margin-bottom:4px; }
  .result { margin-top:14px; padding:12px; background:#0f1115; border:1px solid var(--line); border-radius:8px; font-size:13px; word-break: break-all; }
  .result a { color: var(--accent); }
  .error { color:#e5484d; font-size:13px; margin-top:8px; }
  
  /* Design list styles */
  .design-list { margin-top: 16px; }
  .design-item { display: flex; align-items: center; padding: 12px; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 8px; background: #0f1115; }
  .design-item:hover { border-color: var(--accent); }
  .design-item input[type="checkbox"] { width: auto; margin-right: 12px; }
  .design-info { flex: 1; }
  .design-title { font-weight: 500; margin-bottom: 4px; }
  .design-meta { font-size: 12px; color: var(--muted); }
  .design-type { display: inline-block; padding: 2px 8px; background: var(--line); border-radius: 4px; font-size: 11px; margin-left: 8px; }
  
  .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .toolbar select { width: auto; margin-bottom: 0; }
  .selected-count { color: var(--muted); font-size: 14px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); }
  .empty-state { text-align: center; padding: 40px; color: var(--muted); }
  .empty-state a { color: var(--accent); }
  
  .back-link { display: inline-block; margin-bottom: 20px; color: var(--muted); text-decoration: none; }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <a href="/" class="back-link">← Back to Home</a>
  <h1>export <span>designs</span></h1>
  <div class="sub">Select and download multiple designs from your Canva account</div>
  
  <div class="panel">
    <div class="row">
      <div class="status off" id="status"><span class="dot"></span><span id="statusText">checking…</span></div>
      <div id="connectArea">
        <a class="btn" id="connectBtn" href="/auth/canva">Connect Canva</a>
      </div>
    </div>
  </div>
  
  <div class="panel" id="exportPanel" style="display:none;">
    <div class="toolbar">
      <label style="margin:0;">Export format:</label>
      <select id="exportFormat">
        <option value="png">PNG</option>
        <option value="jpg">JPG</option>
        <option value="pdf">PDF</option>
        <option value="pptx">PPTX</option>
      </select>
      <button id="selectAllBtn" class="secondary">Select All</button>
      <button id="downloadBtn" disabled>Download Selected (<span id="selectedCount">0</span>)</button>
      <button id="gitLfsBtn" class="secondary" title="Export to Git LFS repository">Git LFS Export</button>
      <span class="selected-count" id="selectionStatus"></span>
    </div>
    
    <div id="designListContainer">
      <div class="loading">Loading designs…</div>
    </div>
    
    <div class="result" id="exportResult" style="display:none;"></div>
  </div>
</div>
<script src="/export-app.js"></script>
</body>
</html>
